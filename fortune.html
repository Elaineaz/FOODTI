<!DOCTYPE html>
<html lang="zh-CN">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    body { background: #fdf6f0; }

    .fortune-header {
      width:100%; text-align:center; margin-bottom:8px;
    }

    /* ── 起卦区 ── */
    .cast-section {
      width:100%; display:flex; flex-direction:column;
      align-items:center; gap:16px; margin: 8px 0 24px;
    }
    .cast-hint {
      font-size:13px; color:#aaa; text-align:center; line-height:1.8;
    }
    .cast-btn {
      width:160px; height:160px; border-radius:50%;
      background: linear-gradient(135deg, #fff8f0 0%, #ffe8d0 100%);
      border: 3px solid #f5c842;
      box-shadow: 0 4px 20px rgba(245,200,66,0.25), inset 0 2px 8px rgba(255,255,255,0.8);
      cursor:pointer; display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:6px;
      transition: transform 0.15s, box-shadow 0.15s;
      position:relative; overflow:hidden;
    }
    .cast-btn:hover { transform:scale(1.04); box-shadow:0 8px 28px rgba(245,200,66,0.35); }
    .cast-btn:active { transform:scale(0.97); }
    .cast-btn .cast-icon { font-size:40px; line-height:1; }
    .cast-btn .cast-label {
      font-size:13px; font-weight:900; color:#c8860a; letter-spacing:1px;
    }
    .cast-btn.shaking {
      animation: shake 0.5s ease;
    }
    @keyframes shake {
      0%,100%{transform:rotate(0deg) scale(1.02);}
      20%{transform:rotate(-8deg) scale(1.05);}
      40%{transform:rotate(8deg) scale(1.05);}
      60%{transform:rotate(-5deg) scale(1.03);}
      80%{transform:rotate(5deg) scale(1.03);}
    }

    /* ── 卦象展示 ── */
    .hexagram-section {
      width:100%; display:none; flex-direction:column;
      align-items:center; gap:0;
      animation: fadeSlideIn 0.5s ease;
    }
    .hexagram-section.visible { display:flex; }

    .hexagram-name {
      font-size:22px; font-weight:900; color:#1a1a1a;
      margin-bottom:4px; text-align:center;
    }
    .hexagram-sub {
      font-size:12px; color:#aaa; margin-bottom:20px; text-align:center;
    }

    /* 六爻卦线 */
    .yao-lines {
      display:flex; flex-direction:column-reverse; gap:8px;
      margin-bottom:24px; align-items:center;
    }
    .yao-row {
      display:flex; align-items:center; gap:10px;
    }
    .yao-num {
      font-size:10px; color:#ccc; width:16px; text-align:right;
    }
    .yao-line {
      display:flex; gap:6px; align-items:center;
    }
    /* 阳爻：整条线 */
    .yao-yang {
      width:80px; height:10px; background:#f5c842;
      border-radius:5px;
      box-shadow: 0 2px 6px rgba(245,200,66,0.4);
    }
    /* 阴爻：两段线 */
    .yao-yin-l, .yao-yin-r {
      width:34px; height:10px; background:#c8a0e8;
      border-radius:5px;
      box-shadow: 0 2px 6px rgba(200,160,232,0.4);
    }
    /* 变爻标记 */
    .yao-change {
      font-size:14px; color:#ff6b6b; margin-left:4px;
    }
    .yao-row.is-change .yao-yang,
    .yao-row.is-change .yao-yin-l,
    .yao-row.is-change .yao-yin-r {
      opacity:0.5;
    }

    /* 卦象动画 */
    .yao-row { opacity:0; transform:translateX(-12px); }
    .yao-row.appear {
      animation: yaoIn 0.35s ease forwards;
    }
    @keyframes yaoIn {
      to { opacity:1; transform:translateX(0); }
    }

    /* ── 结果卡片 ── */
    .fortune-card {
      width:100%; border-radius:24px; padding:24px 20px 20px;
      position:relative; overflow:hidden;
      animation: fadeSlideIn 0.5s ease 0.8s both;
    }
    .fortune-card-bg {
      position:absolute; inset:0; border-radius:24px;
      opacity:0.07;
    }
    .fortune-card-border {
      position:absolute; inset:0; border-radius:24px;
      border:3px solid; box-shadow:5px 5px 0;
      pointer-events:none;
    }

    .lucky-food-icon {
      font-size:52px; text-align:center; display:block;
      margin-bottom:8px; filter:drop-shadow(0 4px 8px rgba(0,0,0,0.1));
    }
    .lucky-food-name {
      font-size:26px; font-weight:900; text-align:center;
      color:#1a1a1a; margin-bottom:6px;
    }
    .lucky-food-tag {
      text-align:center; margin-bottom:16px;
    }
    .lucky-tag-pill {
      display:inline-block; padding:3px 12px; border-radius:999px;
      font-size:11px; font-weight:700; border:2px solid;
      margin:0 3px;
    }

    /* 解读区块 */
    .fortune-blocks {
      display:flex; flex-direction:column; gap:12px; margin-top:16px;
    }

      background:rgba(255,255,255,0.7); border-radius:14px;

    }

      font-size:14px; line-height:1.8; color:#333;

    }

    .fortune-verse {

    }

    @keyframes fadeSlideIn {
      from { opacity:0; transform:translateY(16px); }
      to   { opacity:1; transform:translateY(0); }
    }

// 八卦名称列表（用于映射）
const BAGUA = ["乾","坤","震","巽","坎","离","艮","兑"];

// ── 伪随机种子（日期 + 人格码）──
function seedRandom(seed) {
  let s = seed;
  return function() {
    s = (s * 1664525 + 1013904223) & 0xffffffff;
    return (s >>> 0) / 0xffffffff;
  };
}

function getDailySeed(code) {
  const d = new Date();
  const dateStr = `${d.getFullYear()}${d.getMonth()}${d.getDate()}`;
  let hash = 0;
  const str = dateStr + (code || "XGVP");
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) - hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return Math.abs(hash);
}

// ── 生成六爻 ──
// 每爻：6=老阴(变)，7=少阳，8=少阴，9=老阳(变)
function generateYao(rand) {
  // 模拟三枚铜钱：正面=3，反面=2，三枚之和
  const coins = () => Math.floor(rand() * 2) + 2 + Math.floor(rand() * 2) + 2 + Math.floor(rand() * 2) + 2;
  return Array.from({length:6}, () => coins()); // 6~9
}

function yaoIsYang(v) { return v === 7 || v === 9; }
function yaoIsChange(v) { return v === 6 || v === 9; }

// 六爻 → 上下卦（各3爻）→ 卦名
function yaoToTrigram(yao3) {
  // 阳=1，阴=0，从下到上
  const bits = yao3.map(v => yaoIsYang(v) ? 1 : 0);
  const idx = bits[0] + bits[1]*2 + bits[2]*4;
  // 对应：000坤,001震,010坎,011兑,100艮,101离,110巽,111乾
  const map = ["坤","震","坎","兑","艮","离","巽","乾"];
  return map[idx];
}

// ── 页面状态 ──
const params = new URLSearchParams(location.search);
const code = params.get("code") || "XGVP";
const backUrl = params.get("back") || "result.html";

// 设置返回链接
document.getElementById("back-btn").href = backUrl + (location.search.replace("?","&").replace(/&?code=[^&]*/,"").replace(/^&/,"") ? "?" + location.search.replace("?","&").replace(/&?code=[^&]*/,"").replace(/^&/,"") : "");

// 实际上直接用原始URL返回
const fullBack = document.referrer || "result.html";
document.getElementById("back-btn").href = fullBack || "result.html";

let castDone = false;

function startCast() {
  if (castDone) return;

  const btn = document.getElementById("cast-btn");
  btn.classList.add("shaking");
  btn.style.pointerEvents = "none";

  // 摇卦动画
  setTimeout(() => {
    btn.classList.remove("shaking");
    showResult();
  }, 600);
}

function showResult() {
  castDone = true;

  // 生成卦象
  const seed = getDailySeed(code);
  const rand = seedRandom(seed);
  const yaos = generateYao(rand);

  // 上卦（爻4-6）下卦（爻1-3）
  const lowerTrigram = yaoToTrigram(yaos.slice(0,3));
  const upperTrigram = yaoToTrigram(yaos.slice(3,6));

  // 主卦用下卦决定菜系（更直接）
  const mainGua = lowerTrigram;
  const guaData = LUCKY_FOODS[mainGua];

  // 用随机数选两道菜中的一道
  const foodIdx = Math.floor(rand() * guaData.foods.length);
  const food = guaData.foods[foodIdx];

  // 渲染卦名
  document.getElementById("hex-name").textContent = guaData.name;
  document.getElementById("hex-sub").textContent = `本卦：${lowerTrigram}卦  互卦：${upperTrigram}卦`;

  // 渲染六爻线（带动画）
  const yaoContainer = document.getElementById("yao-lines");
  yaoContainer.innerHTML = "";
  yaos.forEach((v, i) => {
    const row = document.createElement("div");
    row.className = "yao-row" + (yaoIsChange(v) ? " is-change" : "");

    const numEl = document.createElement("div");
    numEl.className = "yao-num";
    numEl.textContent = i + 1;

    const lineEl = document.createElement("div");
    lineEl.className = "yao-line";

    if (yaoIsYang(v)) {
      const bar = document.createElement("div");
      bar.className = "yao-yang";
      lineEl.appendChild(bar);
    } else {
      const l = document.createElement("div"); l.className = "yao-yin-l";
      const r = document.createElement("div"); r.className = "yao-yin-r";
      lineEl.appendChild(l); lineEl.appendChild(r);
    }

    if (yaoIsChange(v)) {
      const ch = document.createElement("span");
      ch.className = "yao-change"; ch.textContent = "○";
      lineEl.appendChild(ch);
    }

    row.appendChild(numEl);
    row.appendChild(lineEl);
    yaoContainer.appendChild(row);

    // 逐爻出现动画
    setTimeout(() => row.classList.add("appear"), i * 120);
  });

  // 渲染结果卡片
  const card = document.getElementById("fortune-card");
  const bg = document.getElementById("fc-bg");
  const border = document.getElementById("fc-border");
  bg.style.background = guaData.color;
  border.style.borderColor = guaData.color;
  border.style.boxShadow = `5px 5px 0 ${guaData.color}`;

  document.getElementById("lucky-icon").textContent = food.icon;
  document.getElementById("lucky-name").textContent = food.name;

  const tagWrap = document.getElementById("lucky-tag");
  tagWrap.innerHTML = food.tags.map(t =>
    `<span class="lucky-tag-pill" style="border-color:${guaData.color};color:${guaData.color}">${t}</span>`
  ).join("");

  // 解读区块
  const blocks = document.getElementById("fortune-blocks");
  blocks.innerHTML = `
    <div class="fortune-block">
      <div class="fortune-block-title">
        <span class="fortune-block-dot" style="background:${guaData.color}"></span>
        🔮 卦象解读
      </div>
      <div class="fortune-block-body">${food.reason}</div>
    </div>
    <div class="fortune-block">
      <div class="fortune-block-title">
        <span class="fortune-block-dot" style="background:${guaData.color}"></span>
        ☯️ 今日宜忌
      </div>
      <div class="yi-ji-row">
        <div class="yi-box">
          <div class="yi-ji-label">今日宜</div>
          <div class="yi-ji-content">${food.yi}</div>
        </div>
        <div class="ji-box">
          <div class="yi-ji-label">今日忌</div>
          <div class="yi-ji-content">${food.ji}</div>
        </div>
      </div>
    </div>
    <div class="fortune-verse" style="background:${guaData.color}">${food.verse}</div>
  `;

  // 显示结果区
  document.getElementById("cast-section").style.display = "none";
  const hexSection = document.getElementById("hexagram-section");
  hexSection.classList.add("visible");
}

function resetCast() {
  castDone = false;
  document.getElementById("cast-section").style.display = "flex";
  document.getElementById("hexagram-section").classList.remove("visible");
  document.getElementById("yao-lines").innerHTML = "";
  const btn = document.getElementById("cast-btn");
  btn.style.pointerEvents = "auto";
}
</script>
</body>
</html>
