<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>你的餐饮人格 · FOODTI</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet"/>
  <style>
    .result-header{width:100%;text-align:center;margin-bottom:16px;}
    .result-header .pixel-font{font-size:14px;letter-spacing:3px;}

    /* 主卡片 */
    .result-card{
      width:100%;border-radius:24px;padding:28px 24px 24px;
      text-align:center;animation:fadeSlideIn 0.4s ease;
      position:relative;overflow:hidden;
    }
    .result-card-bg{
      position:absolute;inset:0;opacity:0.08;
      background:var(--c,#FF6B6B);border-radius:24px;
    }
    .result-card-border{
      position:absolute;inset:0;border-radius:24px;
      border:3px solid var(--c,#FF6B6B);
      box-shadow:6px 6px 0 var(--c,#FF6B6B);
      pointer-events:none;
    }

    .mascot-wrap{display:flex;justify-content:center;margin:12px 0 16px;}
    .mascot-wrap svg{filter:drop-shadow(0 4px 12px rgba(0,0,0,0.12));}

    .result-code{
      font-family:'Press Start 2P','Courier New',monospace;
      font-size:11px;letter-spacing:4px;margin-bottom:6px;
    }
    .result-name{font-size:28px;font-weight:900;margin-bottom:4px;color:#1a1a1a;}
    .result-emoji{font-size:32px;display:block;margin-bottom:8px;}

    .dim-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:10px 0 16px;}
    .dim-tag{
      padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;
      border:2px solid var(--c,#FF6B6B);color:var(--c,#FF6B6B);
    }

    /* 深度解读区块 */
    .detail-section{
      width:100%;margin-top:20px;
      display:flex;flex-direction:column;gap:14px;
    }
    .detail-block{
      background:#fff;border-radius:16px;padding:16px 18px;
      border:2px solid #f0f0f0;text-align:left;
      box-shadow:3px 3px 0 #f0f0f0;
    }
    .detail-block-title{
      font-size:11px;font-weight:900;color:#aaa;
      letter-spacing:1px;margin-bottom:8px;
      display:flex;align-items:center;gap:6px;
    }
    .detail-block-title .dot{
      width:8px;height:8px;border-radius:2px;
      background:var(--c,#FF6B6B);display:inline-block;flex-shrink:0;
    }
    .detail-block-body{font-size:14px;line-height:1.8;color:#333;}

    .vibe-block{
      background:var(--c,#FF6B6B);border-radius:16px;padding:16px 18px;
      text-align:center;color:#fff;font-size:15px;font-weight:700;
      line-height:1.6;font-style:italic;
      box-shadow:3px 3px 0 rgba(0,0,0,0.15);
    }

    .food-tag-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}
    .food-tag{
      padding:4px 12px;border-radius:8px;font-size:12px;font-weight:700;
      background:var(--c,#FF6B6B);color:#fff;opacity:0.85;
    }

    .retry-row{display:flex;gap:12px;justify-content:center;margin-top:28px;flex-wrap:wrap;}

    /* 维度百分比 */
    .dim-bars{
      width:100%;margin-top:18px;
      display:flex;flex-direction:column;gap:11px;
      text-align:left;
    }
    .dim-bar-row{display:flex;align-items:center;gap:8px;}
    .dim-bar-label{
      font-size:12px;font-weight:900;width:52px;flex-shrink:0;
      color:#444;line-height:1.2;
    }
    .dim-bar-label span{
      display:block;font-size:10px;font-weight:700;color:#aaa;margin-top:1px;
    }
    .dim-bar-track{
      flex:1;height:9px;background:rgba(0,0,0,0.06);border-radius:999px;overflow:hidden;
    }
    .dim-bar-fill{
      height:100%;border-radius:999px;
      transition:width 0.9s cubic-bezier(.4,0,.2,1);
      width:0%;
    }
    .dim-bar-vs{
      font-size:10px;color:#bbb;width:54px;flex-shrink:0;text-align:right;
      white-space:nowrap;
    }
  </style>
</head>

        </div>
      </div>
      <span style="font-size:18px;color:#f5c842;">→</span>

  XGVP:{code:"XGVP",name:"城市觅食官",emoji:"🗺️",color:"#FF6B6B",tag:"探索·社交·感性·计划",desc:"新店雷达永远在线，朋友圈的美食情报站。",detail:{portrait:"你是那种会提前一周就开始规划周末吃什么的人。小红书、大众点评、抖音——只要有新店开业，你的雷达就会第一时间响起。你享受和朋友一起探店的过程，那种「我们是第一批来的」的成就感让你特别满足。",strength:"你的美食地图永远是最新的，朋友们出门吃饭第一个想到的就是你。你有规划能力，不会让大家饿着肚子在街上乱转，总能提前订好位、安排好行程。",weakness:"有时候太执着于「打卡新店」，反而忽略了身边那些低调但真正好吃的老店。偶尔也会因为攻略做得太细，少了一些随机发现惊喜的乐趣。",food_match:"网红餐厅、创意料理、限定菜单、节气特供",vibe:"「这家刚开业，我已经订好位了，走！」"}},

const params=new URLSearchParams(location.search);

// 从URL读取原始分数
const rawScores={
  X:parseInt(params.get("X")||0),
  C:parseInt(params.get("C")||0),
  G:parseInt(params.get("G")||0),
  S:parseInt(params.get("S")||0),

// 维度百分比进度条
const dimBarsWrap = document.getElementById("dim-bars");
const DIM_PAIRS = [
  { a:"X", aName:"探索", b:"C", bName:"忠诚", color:"#FF9F7F" },
  { a:"G", aName:"社交", b:"S", bName:"独享", color:"#7FC8FF" },
  { a:"V", aName:"感性", b:"R", bName:"理性", color:"#B89FFF" },
  { a:"P", aName:"计划", b:"W", bName:"随性", color:"#6DDBB8" },
];

// 检查是否有分数数据（直接访问结果页时无分数）
const hasScores = (rawScores.X+rawScores.C+rawScores.G+rawScores.S+rawScores.V+rawScores.R+rawScores.P+rawScores.W) > 0;

if (hasScores) {
  const titleEl = document.createElement("div");
  titleEl.style.cssText = "font-size:11px;font-weight:900;color:#aaa;letter-spacing:1px;margin-bottom:10px;display:flex;align-items:center;gap:6px;";
  titleEl.innerHTML = `<span style="width:8px;height:8px;border-radius:2px;background:${p.color};display:inline-block"></span>📊 你的维度分布`;
  dimBarsWrap.appendChild(titleEl);

  DIM_PAIRS.forEach(dim => {
    const aVal = rawScores[dim.a] || 0;
    const bVal = rawScores[dim.b] || 0;
    const total = aVal + bVal;
    const aPct = total > 0 ? Math.round(aVal / total * 100) : 50;
    const bPct = 100 - aPct;
    // 主导方
    const dominant = aPct >= bPct ? dim.aName : dim.bName;
    const dominantPct = Math.max(aPct, bPct);

    const row = document.createElement("div");
    row.className = "dim-bar-row";
    row.innerHTML = `
      <div class="dim-bar-label">
        ${dominant}
        <span>${dominantPct}%</span>
      </div>
      <div class="dim-bar-track">
        <div class="dim-bar-fill" style="background:${dim.color}" data-pct="${dominantPct}"></div>
      </div>
      <div class="dim-bar-vs">${dim.aName} / ${dim.bName}</div>
    `;
    dimBarsWrap.appendChild(row);
  });

  // 动画：延迟触发进度条填充
  setTimeout(() => {
    dimBarsWrap.querySelectorAll(".dim-bar-fill").forEach(el => {
      el.style.width = el.dataset.pct + "%";
    });
  }, 300);
} else {
  // 无分数时隐藏
  dimBarsWrap.style.display = "none";
}
