function getFoodSVG(idx, size) {
  size = size || 90;
  const f = FOODS[idx % FOODS.length];
  return `<div style="background:${f.bg};border-radius:50%;width:${size}px;height:${size}px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.08)"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="${size*0.8}" height="${size*0.8}">${f.svg}</svg></div>`;
}

function calcPersonality(sc){
  const X=sc.X||0,C=sc.C||0,G=sc.G||0,S=sc.S||0,V=sc.V||0,R=sc.R||0,P=sc.P||0,W=sc.W||0;
  return (X>=C?"X":"C")+(G>=S?"G":"S")+(V>=R?"V":"R")+(P>=W?"P":"W");
}

// ── 答题逻辑 ──
let current=0;
const scores={X:0,C:0,G:0,S:0,V:0,R:0,P:0,W:0};
const LETTERS=["A","B","C","D"];
const COLORS=["#FF6B6B","#FF9F43","#EE5A24","#F79F1F","#A29BFE","#6C5CE7","#00B894","#00CEC9","#FDCB6E","#E17055","#74B9FF","#0984E3"];

const companionWrap = document.getElementById("companion-wrap");
let bo=0, bd=1;
setInterval(()=>{
  bo+=bd*0.5; if(bo>=4||bo<=0) bd*=-1;
  companionWrap.style.transform=`translateY(${bo}px)`;
}, 40);

function renderQuestion(idx){
  const q=QUESTIONS[idx], total=QUESTIONS.length;
  document.getElementById("progress-text").textContent="第 "+(idx+1)+" 题";
  document.getElementById("progress-count").textContent=(idx+1)+" / "+total;
  document.getElementById("progress-fill").style.width=((idx+1)/total*100).toFixed(1)+"%";
  document.getElementById("question-num").textContent="Q."+String(idx+1).padStart(2,"0");
  document.getElementById("question-text").textContent=q.text;

  // 更新食物图标
  companionWrap.innerHTML = getFoodSVG(idx, 90);

  const list=document.getElementById("options-list");
  list.innerHTML="";
  q.options.forEach((opt,i)=>{
    const btn=document.createElement("button");
    btn.className="option-btn";
    btn.innerHTML=`<span class="option-letter">${LETTERS[i]}</span><span>${opt.text}</span>`;
    btn.addEventListener("click",()=>onSelect(opt.score,btn));
    list.appendChild(btn);
  });
  const card=document.getElementById("question-card");
  card.style.animation="none"; card.offsetHeight; card.style.animation="";
}

function onSelect(score,btn){
  document.querySelectorAll(".option-btn").forEach(b=>b.classList.remove("selected"));
  btn.classList.add("selected");
  Object.entries(score).forEach(([k,v])=>{scores[k]=(scores[k]||0)+v;});
  setTimeout(()=>{
    current++;
    if(current<QUESTIONS.length){renderQuestion(current);}
    else{
      const code=calcPersonality(scores);
      const s=scores;
      const q=`code=${code}&X=${s.X||0}&C=${s.C||0}&G=${s.G||0}&S=${s.S||0}&V=${s.V||0}&R=${s.R||0}&P=${s.P||0}&W=${s.W||0}`;
      window.location.href="result.html?"+q;
    }
  },320);
}

renderQuestion(0);
